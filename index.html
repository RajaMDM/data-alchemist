<style>
:root {
  --bg:#F2F7FF; --surf:#FFFFFF; --bdr:#D9E8F7; --bdr2:#C4DAF2;
  --ink:#08142A; --ink2:#1A3050; --mute:#4A6FA5; --faint:#7A9CC4;
  --sky:#0284C7; --sky2:#0EA5E9; --skyl:#E0F2FE; --skyb:#BAE6FD;
  --rose:#E11D48; --rosel:#FFF1F2; --roseb:#FECDD3;
  --amber:#D97706; --amberl:#FFFBEB; --amberb:#FDE68A;
  --violet:#6D28D9; --violl:#F5F3FF; --violb:#DDD6FE;
  --green:#059669; --greenl:#ECFDF5; --greenb:#A7F3D0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;overflow-x:hidden}
.dsp{font-family:'Bricolage Grotesque',sans-serif}
::-webkit-scrollbar{width:6px;background:#EEF4FB}
::-webkit-scrollbar-thumb{background:#C4DAF2;border-radius:3px}
input,button{font-family:'Plus Jakarta Sans',sans-serif}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes floatA{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-14px) rotate(3deg)}}
@keyframes floatB{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px) rotate(-2deg)}}
@keyframes floatC{0%,100%{transform:translateY(0)}33%{transform:translateY(-16px)}66%{transform:translateY(-5px)}}
@keyframes dashFlow{to{stroke-dashoffset:-36}}
@keyframes orbit{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes pingDot{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.35);opacity:.6}}
@keyframes dotBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes nodePulse{0%,100%{r:4;opacity:.22}50%{r:6.5;opacity:.5}}
@keyframes shimIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .4s ease both}
.card{background:var(--surf);border:1.5px solid var(--bdr);border-radius:22px;transition:box-shadow .2s,transform .2s}
.card:hover{box-shadow:0 8px 36px rgba(2,132,199,.1);transform:translateY(-2px)}
.inp{width:100%;background:#F4F9FF;border:1.5px solid var(--bdr2);border-radius:13px;padding:12px 15px;font-size:14px;color:var(--ink);outline:none;transition:border-color .15s,box-shadow .15s}
.inp:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(2,132,199,.12)}
</style>

const TRACKER_URL = "https://script.google.com/macros/s/AKfycbz5EfcUxWP6v10nBtSyJwqHKRNPD6-1qbEhhqkbZC5QJ_7UlLTRMUZjTP_D9MajwwsW/exec";

async function trackLogin(name, email, org, keyHint) {
  if (!TRACKER_URL) return; // tracking disabled if URL not set
  try {
    const sessionId = "sess_" + Math.random().toString(36).slice(2, 10) + "_" + Date.now();
    const browser   = navigator.userAgent.match(/(Chrome|Firefox|Safari|Edge)[\/\s]([\d.]+)/)?.[0] || navigator.userAgent.slice(0,40);
    const timezone  = Intl.DateTimeFormat().resolvedOptions().timeZone || "unknown";
    await fetch(TRACKER_URL, {
      method: "POST",
      mode: "no-cors", // avoids CORS issues with Apps Script
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, email, org, sessionId, browser, timezone, keyHint }),
    });
  } catch (err) {
    // fail silently — never block the student login
    console.warn("Tracker:", err.message);
  }
}

// ── SESSION PERSISTENCE (localStorage + Google Sheets cloud sync) ─────────
const LS = {
  key: (email) => `alch__${(email||"guest").replace(/[^a-z0-9]/gi,"_").toLowerCase()}`,

  // Local read/write (instant)
  load:  (email) => { try { return JSON.parse(localStorage.getItem(LS.key(email)) || "{}"); } catch { return {}; } },
  save:  (email, data) => { try { localStorage.setItem(LS.key(email), JSON.stringify(data)); } catch {} },
  patch: (email, updater) => {
    const d = LS.load(email);
    const next = updater(d);
    LS.save(email, next);
    if (email) LS.pushCloud(email, next); // fire-and-forget cloud sync
  },

  // Cloud push — save session to Google Sheets (async, silent)
  pushCloud: async (email, data) => {
    if (!TRACKER_URL || !email) return;
    try {
      const { chatHistory, topicCache } = data;
      await fetch(TRACKER_URL, {
        method: "POST", mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          action: "saveSession", email,
          name: data._name || "", org: data._org || "",
          sessionData: { chatHistory: chatHistory||{}, topicCache: topicCache||{} },
        }),
      });
    } catch { /* fail silently */ }
  },

  // Cloud pull — fetch session from Sheets on login, merge into localStorage
  pullCloud: async (email) => {
    if (!TRACKER_URL || !email) return { found: false };
    try {
      const url = TRACKER_URL + "?action=getSession&email=" + encodeURIComponent(email);
      const r   = await fetch(url);
      if (!r.ok) return { found: false };
      const json = await r.json();
      if (json.found && json.sessionData) {
        const local  = LS.load(email);
        const merged = {
          ...local,
          chatHistory: { ...(local.chatHistory||{}), ...(json.sessionData.chatHistory||{}) },
          topicCache:  { ...(local.topicCache||{}),  ...(json.sessionData.topicCache||{})  },
        };
        LS.save(email, merged);
        return { found: true, lastSaved: json.lastSaved, saveCount: json.saveCount };
      }
      return { found: false };
    } catch { return { found: false }; }
  },
};

// ── MARKDOWN RENDERER ─────────────────────────────────────────────────────
const parseInline = (str, key) => {
  const parts = String(str).split(/(\*\*[^*\n]+\*\*|\*[^*\n]+\*|`[^`\n]+`)/g);
  return parts.map((t, i) => {
    if (t.startsWith("**") && t.endsWith("**")) return <strong key={i}>{t.slice(2,-2)}</strong>;
    if (t.startsWith("*")  && t.endsWith("*"))  return <em key={i}>{t.slice(1,-1)}</em>;
    if (t.startsWith("`")  && t.endsWith("`"))
      return <code key={i} style={{background:"#F1F5F9",borderRadius:4,padding:"1px 5px",
        fontSize:"0.88em",fontFamily:"monospace",color:"#0891B2"}}>{t.slice(1,-1)}</code>;
    return t;
  });
};
const MD = ({text, color}) => {
  if (!text) return null;
  const c = color || "#1A3050";
  const lines = String(text).split("\n");
  const out = [];
  let listBuf = [], listType = null;
  const flushList = () => {
    if (!listBuf.length) return;
    const Tag = listType === "ol" ? "ol" : "ul";
    out.push(React.createElement(Tag, {key:"l"+out.length,
      style:{paddingLeft:20,margin:"6px 0 8px",color:c}},
      listBuf.map((li,i) => <li key={i} style={{marginBottom:4,lineHeight:1.75}}>{parseInline(li)}</li>)
    ));
    listBuf = []; listType = null;
  };
  lines.forEach((raw, i) => {
    const line = raw;
    if (/^### /.test(line)) {
      flushList();
      out.push(<div key={i} style={{fontWeight:700,fontSize:13.5,color:c,marginTop:12,marginBottom:3}}>{parseInline(line.slice(4))}</div>);
    } else if (/^## /.test(line)) {
      flushList();
      out.push(<div key={i} style={{fontFamily:"Bricolage Grotesque,sans-serif",fontWeight:800,
        fontSize:15,color:c,marginTop:14,marginBottom:5,
        borderBottom:"1.5px solid #E2E8F0",paddingBottom:4}}>{parseInline(line.slice(3))}</div>);
    } else if (/^# /.test(line)) {
      flushList();
      out.push(<div key={i} style={{fontFamily:"Bricolage Grotesque,sans-serif",fontWeight:800,
        fontSize:17,color:c,marginTop:16,marginBottom:8}}>{parseInline(line.slice(2))}</div>);
    } else if (/^[-*] /.test(line)) {
      listType = "ul"; listBuf.push(line.slice(2));
    } else if (/^\d+\. /.test(line)) {
      listType = "ol"; listBuf.push(line.replace(/^\d+\. /,""));
    } else if (/^---+$/.test(line.trim())) {
      flushList();
      out.push(<hr key={i} style={{border:"none",borderTop:"1.5px solid #E2E8F0",margin:"10px 0"}}/>);
    } else if (line.trim() === "") {
      flushList();
      out.push(<div key={i} style={{height:5}}/>);
    } else {
      flushList();
      out.push(<div key={i} style={{lineHeight:1.85,marginBottom:1,color:c}}>{parseInline(line)}</div>);
    }
  });
  flushList();
  return <div style={{fontSize:14}}>{out}</div>;
};

// ─── API ─────────────────────────────────────────────────────────────────
async function callAI(key, model, msgs, sys, cb) {
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{ "Content-Type":"application/json", "x-api-key":key,
      "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true" },
    body: JSON.stringify({ model, max_tokens:850, system:sys, stream:true, messages:msgs }),
  });
  if (!r.ok) { const e = await r.json(); throw new Error(e.error?.message || "API error"); }
  const rd = r.body.getReader(), dc = new TextDecoder(); let full = "";
  while (true) {
    const {done,value} = await rd.read(); if (done) break;
    for (const ln of dc.decode(value).split("\n")) {
      if (ln.startsWith("data: ")) { try { const d = JSON.parse(ln.slice(6));
        if (d.type==="content_block_delta"&&d.delta?.text) { full+=d.delta.text; cb(full); } } catch{} }
    }
  }
  return full;
}

      sys:`${BSYS}\nSOCRATIC MODE for ${mod.label}: NEVER give direct answers or explanations. ONLY ask probing questions that lead the student to discover concepts themselves. One question at a time. If they answer well, acknowledge briefly then probe deeper. If stuck, simplify. If they ask you to explain directly, gently decline and reframe as a question. End every response with exactly one question. Be warm but relentless.` },
  };
  const cf = cfgs[mode] || cfgs.tutor;
  const c  = mod.hex;

  // Persist chat history whenever msgs changes
  useEffect(()=>{
    if (msgs.length === 0) return;
    LS.patch(userEmail, d => ({
      ...d,
      chatHistory: { ...(d.chatHistory||{}), [histKey]: msgs.slice(-60) } // keep last 60 msgs
    }));
  }, [msgs]);

  useEffect(()=>{
    if (initMsgs.length > 0) return; // restored — don't re-kick
    if (cf.starter) setMsgs([{role:"assistant",content:cf.starter,id:Date.now()}]);
    else kick();
  },[]);

  useEffect(()=>{ bot.current?.scrollIntoView({behavior:"smooth"}); },[msgs,stream]);

  async function kick() {
    setLoading(true); setStream("");
    try { let o=""; await callAI(apiKey,cf.model,[{role:"user",content:"Begin."}],cf.sys,t=>{o=t;setStream(t)});
      setStream(""); setMsgs([{role:"assistant",content:o,id:Date.now()}]); }
    catch(e) { setErr(e.message); } setLoading(false);
  }
  async function send() {
    if(!inp.trim()||loading) return;
    const u={role:"user",content:inp.trim(),id:Date.now()}, all=[...msgs,u];
    setMsgs(all); setInp(""); setLoading(true); setStream(""); setErr("");
    try { let o=""; await callAI(apiKey,cf.model,all.map(m=>({role:m.role,content:m.content})),cf.sys,t=>{o=t;setStream(t)});
      setStream(""); setMsgs(p=>[...p,{role:"assistant",content:o,id:Date.now()}]); }
    catch(e) { setErr(e.message); } setLoading(false);
  }
  function clearHistory() {
    LS.patch(userEmail, d => { const h={...(d.chatHistory||{})}; delete h[histKey]; return {...d,chatHistory:h}; });
    setMsgs([]); setErr("");
    if (cf.starter) setMsgs([{role:"assistant",content:cf.starter,id:Date.now()}]);
    else kick();
  }

  const hasHistory = initMsgs.length > 0;

  return (
    <div style={{position:"fixed",inset:0,zIndex:1000,background:"rgba(8,20,42,.45)",
      display:"flex",alignItems:"center",justifyContent:"center",padding:16,backdropFilter:"blur(8px)"}}>
      <div style={{width:"100%",maxWidth:720,background:"#fff",border:`1.5px solid ${c}33`,
        borderRadius:26,display:"flex",flexDirection:"column",maxHeight:"90vh",
        boxShadow:`0 24px 60px ${c}20`}}>
        <div style={{padding:"16px 20px",borderBottom:`1.5px solid ${c}18`,
          display:"flex",alignItems:"center",justifyContent:"space-between",
          background:`${c}08`,borderRadius:"24px 24px 0 0"}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:44,height:44,borderRadius:14,background:mod.light,
              border:`1.5px solid ${c}44`,display:"flex",alignItems:"center",
              justifyContent:"center",fontSize:22}}>{mod.icon}</div>
            <div>
              <div className="dsp" style={{fontWeight:700,fontSize:17,color:c}}>{cf.label}</div>
              <div style={{fontSize:11,color:"#7A9CC4",display:"flex",alignItems:"center",gap:8}}>
                {mod.icon} {mod.label} · ALCH · Haiku
                {hasHistory && <span style={{background:c+"18",border:`1px solid ${c}44`,color:c,
                  borderRadius:10,padding:"0px 7px",fontSize:10,fontWeight:700}}>
                  💾 Session restored
                </span>}
              </div>
            </div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {msgs.length > 1 && (
              <button onClick={clearHistory}
                style={{background:"#FFF8E7",border:"1.5px solid #FDE68A",color:"#92400E",
                  borderRadius:10,padding:"6px 12px",cursor:"pointer",fontSize:11,fontWeight:600}}>
                🗑️ Clear
              </button>
            )}
            <button onClick={onClose} style={{background:"rgba(0,0,0,.05)",border:"1px solid #E2E8F0",
              color:"#64748B",borderRadius:10,padding:"7px 14px",cursor:"pointer",fontSize:13,fontWeight:600}}>
              ✕ Close
            </button>
          </div>
        </div>

        <div style={{flex:1,overflowY:"auto",padding:22,display:"flex",flexDirection:"column",gap:14}}>
          {msgs.map(m=>(
            <div key={m.id} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
              {m.role==="user" ? (
                <div style={{maxWidth:"78%",background:`${c}12`,border:`1.5px solid ${c}44`,
                  borderRadius:"18px 18px 4px 18px",padding:"11px 15px",color:c,
                  fontSize:14,fontWeight:500,lineHeight:1.7}}>
                  {m.content}
                </div>
              ) : (
                <div style={{maxWidth:"86%",background:"#F4F9FF",border:"1.5px solid #E2E8F0",

          {loading && (

                borderRadius:"4px 18px 18px 18px",padding:"14px 18px",maxWidth:"86%"}}>

// DQ: 6 Dimensions Wheel
const DQWheel = ({hex}) => {
  const [sel,setSel] = React.useState(null);
  const dims = [
    {id:"completeness", label:"Completeness", icon:"🧩", color:"#0284C7",
     def:"Are all required fields populated?",
     example:"A customer record missing phone number → 80% complete",
     mistake:"Confusing completeness with accuracy — a field can be filled but wrong"},
    {id:"accuracy",     label:"Accuracy",     icon:"🎯", color:"#059669",
     def:"Does the data correctly reflect reality?",
     example:"Customer address shows 'Dubai' but they moved to Abu Dhabi",
     mistake:"Assuming sourced data is automatically accurate — validate against authoritative sources"},
    {id:"consistency",  label:"Consistency",  icon:"🔄", color:"#D97706",
     def:"Is the same data stored the same way across systems?",
     example:"CRM shows DOB as 1990-01-15, ERP shows 15/01/90 — same person, different format",
     mistake:"Treating consistency as a formatting issue only — it's also about conflicting values"},
    {id:"timeliness",   label:"Timeliness",   icon:"⏱️", color:"#6D28D9",
     def:"Is data available when needed and reflecting current state?",
     example:"Stock price updated every 15 mins — stale for high-frequency trading",
     mistake:"Focusing on recency without defining what 'timely enough' means for the use case"},
    {id:"uniqueness",   label:"Uniqueness",   icon:"☝️", color:"#E11D48",
     def:"Is each entity represented exactly once?",
     example:"Same customer in CRM as 'John Smith' and 'J. Smith' — two records, one person",
     mistake:"Treating deduplication as a one-time exercise — duplicates re-enter continuously"},
    {id:"validity",     label:"Validity",     icon:"✅", color:"#0891B2",
     def:"Does data conform to defined rules, formats and constraints?",
     example:"Email field contains 'N/A' — technically filled (complete) but not a valid email",
     mistake:"Conflating validity with accuracy — valid data can still be factually wrong"},
  ];
  const cx=160, cy=160, R=110, r=48;
  return (
    <div style={{background:"#F8FAFC",border:"1.5px solid #D9E8F7",borderRadius:16,padding:20,marginBottom:18}}>
      <div style={{fontSize:10,color:hex,letterSpacing:2,fontWeight:700,marginBottom:14}}>🔬 THE 6 DQ DIMENSIONS — click any segment</div>
      <div style={{display:"flex",gap:20,alignItems:"flex-start",flexWrap:"wrap"}}>
        <svg width="320" height="320" viewBox="0 0 320 320" style={{flex:"0 0 320px"}}>
          {dims.map((d,i)=>{
            const angle = (i/6)*Math.PI*2 - Math.PI/2;
            const a1=(i/6)*Math.PI*2-Math.PI/2, a2=((i+1)/6)*Math.PI*2-Math.PI/2;
            const x1=cx+R*Math.cos(a1),y1=cy+R*Math.sin(a1);
            const x2=cx+R*Math.cos(a2),y2=cy+R*Math.sin(a2);
            const xi1=cx+r*Math.cos(a1),yi1=cy+r*Math.sin(a1);
            const xi2=cx+r*Math.cos(a2),yi2=cy+r*Math.sin(a2);
            const mx=cx+(R+r)/2*Math.cos(angle+Math.PI/6);
            const my=cy+(R+r)/2*Math.sin(angle+Math.PI/6);
            const isSelected=sel===d.id;
            return (
              <g key={d.id} onClick={()=>setSel(sel===d.id?null:d.id)} style={{cursor:"pointer"}}>
                <path d={`M ${xi1} ${yi1} L ${x1} ${y1} A ${R} ${R} 0 0 1 ${x2} ${y2} L ${xi2} ${yi2} A ${r} ${r} 0 0 0 ${xi1} ${yi1}`}
                  fill={isSelected?d.color:d.color+"25"} stroke="#fff" strokeWidth="3"
                  style={{transition:"all .2s",filter:isSelected?"drop-shadow(0 4px 12px "+d.color+"66)":"none"}}/>
                <text x={mx} y={my-7} textAnchor="middle" fontSize="16" style={{pointerEvents:"none"}}>{d.icon}</text>
                <text x={mx} y={my+10} textAnchor="middle" fontSize="9" fontWeight="700"
                  fill={isSelected?"#fff":d.color} style={{pointerEvents:"none"}}>{d.label}</text>
              </g>
            );
          })}
          <circle cx={cx} cy={cy} r={r-4} fill="#fff" stroke="#E2E8F0" strokeWidth="2"/>
          <text x={cx} y={cy-6} textAnchor="middle" fontSize="18">🔬</text>
          <text x={cx} y={cy+10} textAnchor="middle" fontSize="9" fontWeight="700" fill="#4A6FA5">6 DQ</text>
          <text x={cx} y={cy+22} textAnchor="middle" fontSize="9" fill="#94A3B8">Dimensions</text>
        </svg>
        <div style={{flex:1,minWidth:200}}>
          {sel ? (() => { const d=dims.find(x=>x.id===sel); return (
            <div style={{background:"#fff",border:`2px solid ${d.color}44`,borderRadius:14,padding:18,animation:"shimIn .25s ease"}}>
              <div style={{fontSize:22,marginBottom:6}}>{d.icon}</div>
              <div style={{fontFamily:"Bricolage Grotesque,sans-serif",fontSize:16,fontWeight:800,color:d.color,marginBottom:10}}>{d.label}</div>
              <div style={{fontSize:12,fontWeight:700,color:"#7A9CC4",letterSpacing:1,marginBottom:4}}>DEFINITION</div>
              <div style={{fontSize:13,color:"#1A3050",marginBottom:12,lineHeight:1.7}}>{d.def}</div>
              <div style={{fontSize:12,fontWeight:700,color:"#7A9CC4",letterSpacing:1,marginBottom:4}}>REAL-WORLD EXAMPLE</div>
              <div style={{fontSize:13,color:"#4A6FA5",marginBottom:12,lineHeight:1.7,fontStyle:"italic"}}>{d.example}</div>
              <div style={{fontSize:12,fontWeight:700,color:"#E11D48",letterSpacing:1,marginBottom:4}}>COMMON MISTAKE ⚠️</div>
              <div style={{fontSize:13,color:"#E11D48",lineHeight:1.7}}>{d.mistake}</div>
            </div>
          )})() : (
            <div style={{color:"#94A3B8",fontSize:13,textAlign:"center",marginTop:60}}>
              <div style={{fontSize:32,marginBottom:12}}>👆</div>
              Click any segment to explore that dimension — definition, real-world example, and the mistake everyone makes
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

  const trees = {
    customer:{
      label:"Customer Hierarchy",
      root:{id:"global",label:"Global Parent",icon:"🌐",type:"Ultimate Parent",color:"#D97706",children:[

        ]},
      ]},
    },
  };
  const tree = trees[domain];
  const infos = {
    "Ultimate Parent":"The top of the hierarchy — consolidates all child entities. Used for group-level reporting, credit limits, and global KPIs.",
    "Region":"Geographic or organisational grouping below the global parent. Drives regional P&L, compliance, and data sovereignty rules.",
    "Legal Entity":"A legally registered company. Critical for financial reporting, regulatory compliance, and contract management.",
    "Branch":"An operational unit of a legal entity — shares the parent's legal registration but operates independently.",
    "Category Root":"Top-level product classification — all products roll up here for enterprise-wide product analytics.",
    "Category":"Major product grouping — drives catalog structure, pricing tiers, and procurement categories.",
    "Sub-Category":"Granular product classification below category — enables precise inventory management and supplier mapping.",
    "Product":"The leaf node — the actual SKU or product entity with its own attributes, pricing, and lifecycle.",
  };
  const renderNode=(node,depth=0)=>{
    const isSelected=sel===node.id;
    return (
      <div key={node.id} style={{marginLeft:depth*24}}>
        <div onClick={()=>setSel(isSelected?null:node.id)}
          style={{display:"inline-flex",alignItems:"center",gap:8,padding:"7px 14px",

          <span style={{fontSize:12,fontWeight:700,color:isSelected?"#fff":node.color}}>{node.label}</span>
          <span style={{fontSize:10,color:isSelected?"#fff99":node.color+"99",
            background:isSelected?"#ffffff22":node.color+"15",borderRadius:6,padding:"1px 7px"}}>{node.type}</span>
        </div>
        {node.children.length>0 && (
          <div style={{borderLeft:`2px dashed ${node.color}33`,marginLeft:20,paddingLeft:12,marginBottom:4}}>
            {node.children.map(c=>renderNode(c,0))}
          </div>
        )}
      </div>
    );
  };
  const selNode = sel ? (function find(n){if(n.id===sel)return n;for(const c of n.children){const r=find(c);if(r)return r;}return null;})(tree.root) : null;
  return (
    <div style={{background:"#F8FAFC",border:"1.5px solid #D9E8F7",borderRadius:16,padding:20,marginBottom:18}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:10}}>

                color:domain===k?hex:"#7A9CC4",borderRadius:20,padding:"5px 14px",fontSize:11,
                fontWeight:700,cursor:"pointer"}}>{v.label}</button>
          ))}
        </div>
      </div>
      <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
        <div style={{flex:"0 0 auto"}}>{renderNode(tree.root)}</div>
        {selNode && (
          <div style={{flex:1,minWidth:200,background:"#fff",border:`2px solid ${selNode.color}44`,
            borderRadius:14,padding:16,animation:"shimIn .25s ease",alignSelf:"flex-start"}}>
            <div style={{fontSize:20,marginBottom:6}}>{selNode.icon}</div>
            <div style={{fontFamily:"Bricolage Grotesque,sans-serif",fontSize:15,fontWeight:800,
              color:selNode.color,marginBottom:4}}>{selNode.label}</div>
            <div style={{fontSize:11,fontWeight:700,color:"#7A9CC4",letterSpacing:1,marginBottom:8}}>{selNode.type.toUpperCase()}</div>
            <div style={{fontSize:13,color:"#4A6FA5",lineHeight:1.7}}>{infos[selNode.type]}</div>
            {selNode.children.length>0 && (
              <div style={{marginTop:10,fontSize:12,color:"#94A3B8"}}>
                ↳ {selNode.children.length} direct child node{selNode.children.length>1?"s":""}
              </div>
            )}
          </div>
        )}
        {!selNode && <div style={{flex:1,color:"#94A3B8",fontSize:13,textAlign:"center",paddingTop:40}}>
          <div style={{fontSize:28,marginBottom:8}}>🌳</div>
          Click any node to understand its role in the hierarchy
        </div>}
      </div>
    </div>
  );
};

const ModCard = ({apiKey, mod, onChat, userEmail}) => {
  const [open,setOpen]   = useState(false);
  const [topic,setTopic] = useState(null);
  const [depth,setDepth] = useState("quick"); // "quick" | "deep"
  const [ltopic,setLtopic] = useState(null);
  const c = mod.hex;

  // Load topic cache from localStorage on mount
  const [tdata,setTdata] = useState(()=>{
    const stored = LS.load(userEmail);
    return stored.topicCache?.[mod.id] || {};
  });

  // Save topic cache whenever it changes
  useEffect(()=>{
    if (Object.keys(tdata).length === 0) return;
    LS.patch(userEmail, d => ({
      ...d,
      topicCache: { ...(d.topicCache||{}), [mod.id]: tdata }
    }));
  }, [tdata]);

  const depthKey = (t) => `${t}::${depth}`;

  async function explain(t) {
    const k = depthKey(t);
    if (tdata[k]) { setTopic(t); return; }
    setLtopic(t); setTopic(t);
    const prompt = depth === "quick"
      ? `Explain "${t}" in context of ${mod.label}: 4-5 punchy sentences, one real-world analogy, one thing students always get wrong. Engaging tone.`
      : `Give a thorough explanation of "${t}" in context of ${mod.label}. Structure your response with:
## What Is It?
Clear definition in plain English.
## Why It Matters

          boxShadow:"0 6px 28px rgba(2,132,199,.35)",transition:"transform .15s"}}>
        {open ? "✕" : "🤖"}
